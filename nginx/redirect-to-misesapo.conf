# EC2 用: 全リクエストを https://misesapo.co.jp へ 301 リダイレクト
# 使い方: このファイルを EC2 の /etc/nginx/conf.d/ にコピーし、
#         default_server が必要な場合は server_name _; の行の前に
#         listen 80 default_server; のように default_server を付与する。
# 詳細: docs/EC2_REDIRECT_TO_MISESAPO.md

server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://misesapo.co.jp$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;
    # リダイレクト専用のため自己署名で可。Let's Encrypt を使う場合はパスを差し替える
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    return 301 https://misesapo.co.jp$request_uri;
}
